<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>GEAT CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F172A;--bg2:#1E293B;--bg3:#334155;
  --brd:#334155;--brd2:#475569;
  --txt:#F1F5F9;--txt2:#94A3B8;--txt3:#64748B;
  --acc:#F59E0B;--acc2:#FCD34D;
  --blue:#3B82F6;--green:#22C55E;--red:#EF4444;--purple:#A855F7;
  --r:10px;--r2:14px;--r3:18px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{width:100%;max-width:380px}
.login-brand{text-align:center;margin-bottom:32px}
.login-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px}
.login-logo-mark{width:44px;height:44px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000}
.login-logo-name{font-size:26px;font-weight:600;letter-spacing:-0.5px}
.login-sub{font-size:11px;color:var(--txt3);letter-spacing:0.15em;text-transform:uppercase}
.login-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:24px}
.login-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block}
.login-select{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-family:var(--font);font-size:14px;cursor:pointer;outline:none;margin-bottom:20px;-webkit-appearance:none}
.login-select:focus{border-color:var(--acc)}
.pin-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;text-align:center;display:block}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--brd2);transition:all 0.2s}
.pin-dot.filled{background:var(--acc);border-color:var(--acc)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:16px;font-size:18px;font-weight:500;color:var(--txt);cursor:pointer;transition:all 0.15s;font-family:var(--font)}
.pin-btn:active{transform:scale(0.95);background:var(--brd)}
.pin-del{grid-column:3}
.pin-zero{grid-column:2}
.login-err{text-align:center;font-size:12px;color:var(--red);margin-top:12px;min-height:18px}

/* APP */
#app{display:none;height:100vh;height:100dvh;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.topbar-brand{font-size:15px;font-weight:600;color:var(--acc);flex:1}
.topbar-user{font-size:12px;color:var(--txt3)}
.topbar-btn{width:34px;height:34px;background:none;border:1px solid var(--brd);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:var(--txt)}
.topbar-btn.primary{background:var(--acc);border-color:var(--acc);color:#000}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:64px}
.panel{display:none;padding:16px;min-height:calc(100vh - 52px - 56px)}
.panel.active{display:block}
.bottomnav{height:56px;background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-around;padding:0 4px;position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3
