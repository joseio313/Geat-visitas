<!-- ========================= -->
<!-- NUEVOS MODULOS CIERRE -->
<!-- ========================= -->

<!-- PANEL CERRADOR -->
<div class="panel" id="pn-cierre">

  <div class="ph">
    <div>
      <div class="ph-t">Proceso de Cierre</div>
      <div class="ph-s">Clientes en etapa avanzada</div>
    </div>
  </div>

  <div id="cierre-list"></div>

</div>


<!-- ========================= -->
<!-- MODULO REUNIONES -->
<!-- ========================= -->

<div class="ov" id="sh-reuniones" onclick="csBg(event,'reuniones')">
  <div class="sh">
    <div class="sh-hdr">
      <div class="sh-ttl">Reuniones</div>
      <button class="sh-cls" onclick="cs('reuniones')">✕</button>
    </div>

    <div class="sh-body" id="reuniones-body"></div>

    <div class="sh-ftr">
      <button class="btn btn-p" onclick="agregarReunion()">+ Nueva reunión</button>
    </div>
  </div>
</div>


<!-- ========================= -->
<!-- MODULO COTIZACIONES -->
<!-- ========================= -->

<div class="ov" id="sh-cotizacion" onclick="csBg(event,'cotizacion')">
  <div class="sh">
    <div class="sh-hdr">
      <div class="sh-ttl">Cotización</div>
      <button class="sh-cls" onclick="cs('cotizacion')">✕</button>
    </div>

    <div class="sh-body">

      <div class="fg">
        <label>M2</label>
        <input class="fi" id="cot_m2" type="number">
      </div>

      <div class="fg">
        <label>Precio por m2</label>
        <input class="fi" id="cot_precio" type="number">
      </div>

      <div class="fg">
        <label>Total</label>
        <input class="fi" id="cot_total" disabled>
      </div>

    </div>

    <div class="sh-ftr">
      <button class="btn btn-p" onclick="guardarCotizacion()">Guardar</button>
    </div>
  </div>
</div>


<!-- ========================= -->
<!-- MODULO PROPUESTAS -->
<!-- ========================= -->

<div class="ov" id="sh-propuesta" onclick="csBg(event,'propuesta')">
  <div class="sh">
    <div class="sh-hdr">
      <div class="sh-ttl">Propuesta</div>
      <button class="sh-cls" onclick="cs('propuesta')">✕</button>
    </div>

    <div class="sh-body">

      <div class="fg">
        <label>Descripción</label>
        <textarea class="fta" id="prop_desc"></textarea>
      </div>

      <div class="fg">
        <label>Estado</label>
        <select class="fsel" id="prop_estado">
          <option value="enviada">Enviada</option>
          <option value="aceptada">Aceptada</option>
          <option value="rechazada">Rechazada</option>
        </select>
      </div>

    </div>

    <div class="sh-ftr">
      <button class="btn btn-p" onclick="guardarPropuesta()">Guardar</button>
    </div>
  </div>
</div>


<!-- ========================= -->
<!-- MODULO RESERVAS -->
<!-- ========================= -->

<div class="ov" id="sh-reserva" onclick="csBg(event,'reserva')">
  <div class="sh">
    <div class="sh-hdr">
      <div class="sh-ttl">Reserva</div>
      <button class="sh-cls" onclick="cs('reserva')">✕</button>
    </div>

    <div class="sh-body">

      <div class="fg">
        <label>Monto</label>
        <input class="fi" id="res_monto" type="number">
      </div>

      <div class="fg">
        <label>Comprobante (URL o imagen)</label>
        <input class="fi" id="res_comprobante">
      </div>

      <div class="fg">
        <label>Estado</label>
        <select class="fsel" id="res_estado">
          <option value="pendiente">Pendiente</option>
          <option value="confirmado">Confirmado</option>
        </select>
      </div>

    </div>

    <div class="sh-ftr">
      <button class="btn btn-p" onclick="guardarReserva()">Guardar</button>
    </div>
  </div>
</div>


<!-- ========================= -->
<!-- LOGICA JS BASE -->
<!-- ========================= -->

<script>

// =========================
// REUNIONES (max 5)
// =========================
function agregarReunion(){
  alert("Aquí creas una reunión (máx 5)");
}

// =========================
// COTIZACION AUTO CALCULO
// =========================
document.getElementById("cot_m2").oninput = calcCot;
document.getElementById("cot_precio").oninput = calcCot;

function calcCot(){
  let m2 = parseFloat(document.getElementById("cot_m2").value || 0);
  let p = parseFloat(document.getElementById("cot_precio").value || 0);
  document.getElementById("cot_total").value = m2 * p;
}

// =========================
// GUARDAR FUNCIONES BASE
// =========================

function guardarCotizacion(){
  toast("Cotización guardada");
}

function guardarPropuesta(){
  toast("Propuesta guardada");
}

function guardarReserva(){
  toast("Reserva registrada");
}

</script>
